<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>たびのあしあと</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #0ea5e9; --primary-dark: #0284c7;
    --grad-start: #0ea5e9; --grad-end: #6366f1;
    --danger: #ef4444; --bg: #f0f4f8; --card: #fff;
    --text: #1e293b; --subtext: #64748b;
    --border: #e2e8f0; --shadow: 0 2px 16px rgba(0,0,0,0.08);
  }
  body {
    font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }

  .hidden { display: none !important; }

  /* ---- スピナー ---- */
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 18px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- ローディング画面 ---- */
  .overlay-loading {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 300;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
  }

  /* ---- フォーム共通 ---- */
  input {
    width: 100%; padding: 13px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 15px; color: var(--text);
    background: white; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none; appearance: none;
    font-family: inherit;
  }
  input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(14,165,233,0.12); }

  .btn {
    padding: 12px 20px; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; white-space: nowrap; width: 100%;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:active { background: var(--primary-dark); }
  .btn-secondary {
    background: white; color: var(--primary);
    border: 1.5px solid var(--primary); width: auto; padding: 12px 18px;
  }
  .btn-secondary:active { background: #f0f9ff; }

  /* ---- ヘッダー ---- */
  header {
    background: linear-gradient(135deg, var(--grad-start) 0%, var(--grad-end) 100%);
    color: white;
    padding: 28px 16px 24px;
    text-align: center;
  }
  .header-logo {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 4px;
  }
  .header-logo svg { opacity: 0.95; }
  header h1 { font-size: 24px; font-weight: 700; letter-spacing: 0.5px; }
  header p  { font-size: 13px; opacity: 0.8; margin-top: 5px; }

  /* ---- メインコンテンツ ---- */
  .content {
    padding: 16px;
    max-width: 600px;
    margin: 0 auto;
    padding-bottom: 40px;
  }

  /* ---- 新規作成ボタン ---- */
  .btn-create {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 18px;
    background: var(--primary); color: white;
    border: none; border-radius: 16px;
    font-size: 17px; font-weight: 700; cursor: pointer;
    margin: 16px 0 12px;
    box-shadow: 0 4px 16px rgba(14,165,233,0.35);
    transition: all 0.15s; font-family: inherit;
  }
  .btn-create:active { transform: scale(0.97); box-shadow: none; }

  /* ---- 参加カード ---- */
  .join-card {
    background: white; border-radius: 16px;
    padding: 16px; box-shadow: var(--shadow);
    margin-bottom: 24px;
  }
  .join-card-title {
    font-size: 12px; font-weight: 700; color: var(--subtext);
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .join-row { display: flex; gap: 8px; align-items: center; }
  .join-input {
    flex: 1; font-size: 20px; font-weight: 700; letter-spacing: 5px;
    text-align: center; text-transform: uppercase; padding: 12px 10px;
  }

  /* ---- セクションタイトル ---- */
  .section-title {
    font-size: 11px; font-weight: 700;
    color: var(--subtext); text-transform: uppercase;
    letter-spacing: 0.8px; margin-bottom: 10px;
  }

  /* ---- 旅行カード ---- */
  .trip-card {
    background: white; border-radius: 16px;
    padding: 14px 16px; box-shadow: var(--shadow);
    margin-bottom: 10px;
    transition: all 0.15s;
  }
  .trip-card:active { transform: scale(0.98); box-shadow: none; }
  .trip-card-top {
    display: flex; align-items: center; cursor: pointer; padding-bottom: 12px;
  }
  .trip-icon {
    width: 48px; height: 48px; border-radius: 12px;
    background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
    display: flex; align-items: center; justify-content: center;
    margin-right: 14px; flex-shrink: 0; color: white;
  }
  .trip-info { flex: 1; min-width: 0; }
  .trip-name {
    font-size: 16px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .trip-date { font-size: 12px; color: var(--subtext); margin-top: 3px; display: flex; align-items: center; gap: 4px; }
  .trip-last { font-size: 11px; color: var(--subtext); margin-top: 2px; }
  .trip-actions { display: flex; align-items: center; gap: 6px; margin-left: 10px; flex-shrink: 0; }
  .trip-share {
    background: #f1f5f9; border: none; border-radius: 8px;
    padding: 8px; cursor: pointer; color: var(--subtext);
    transition: all 0.15s; display: flex; align-items: center;
  }
  .trip-share:active { background: #dbeafe; color: var(--primary); }
  .trip-arrow { color: var(--subtext); display: flex; align-items: center; }

  /* ---- フィーチャー行 ---- */
  .trip-feat-row {
    display: flex; gap: 6px; padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .trip-feat-btn {
    flex: 1; text-align: center; padding: 9px 4px;
    background: #f8faff; border-radius: 10px;
    font-size: 11px; font-weight: 600; color: var(--subtext);
    text-decoration: none; transition: all 0.15s; display: flex;
    align-items: center; justify-content: center; gap: 4px;
  }
  .trip-feat-btn:active { background: #dbeafe; color: var(--primary); }

  /* ---- テーマセレクター ---- */
  .theme-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 6px;
  }
  .theme-btn {
    border: 2px solid var(--border); border-radius: 12px; padding: 10px 4px;
    background: white; cursor: pointer; text-align: center; transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .theme-swatch {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  }
  .theme-btn .th-label { font-size: 10px; font-weight: 700; color: var(--subtext); }
  .theme-btn:active { transform: scale(0.95); }
  .theme-btn.selected { border-color: var(--theme-color); background: color-mix(in srgb, var(--theme-color) 8%, white); }
  .theme-btn.selected .th-label { color: var(--theme-color); }

  /* ---- 空状態 ---- */
  .empty-state {
    text-align: center; padding: 50px 20px; color: var(--subtext);
  }
  .empty-state .icon { display: flex; justify-content: center; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .empty-state p  { font-size: 14px; line-height: 1.8; }

  /* ---- モーダル ---- */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 500;
    display: flex; align-items: flex-end;
  }
  .modal-sheet {
    background: white; border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%; max-height: 85vh; overflow-y: auto;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: none; } }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 22px;
  }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-close {
    background: none; border: none; font-size: 22px;
    color: var(--subtext); cursor: pointer; padding: 4px; line-height: 1;
    display: flex; align-items: center;
  }
  .modal-close:active { color: var(--text); }
  .form-field  { margin-bottom: 14px; }
  .form-label  {
    display: block; font-size: 11px; font-weight: 700;
    color: var(--subtext); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 5px;
  }
  .date-row   { display: flex; gap: 8px; align-items: center; }
  .date-sep   { color: var(--subtext); flex-shrink: 0; font-size: 15px; }
  .form-error { color: var(--danger); font-size: 13px; margin-bottom: 10px; display: none; }

  /* ---- トースト ---- */
  .toast {
    position: fixed; bottom: 30px;
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1e293b; color: white;
    padding: 10px 22px; border-radius: 24px;
    font-size: 13px; font-weight: 600;
    opacity: 0; transition: all 0.3s;
    pointer-events: none; white-space: nowrap; z-index: 600;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---- Lucideアイコン ---- */
  [data-lucide] { display: inline-block; vertical-align: middle; }
</style>
</head>
<body>

<!-- ローディング -->
<div id="overlay-loading" class="overlay-loading hidden">
  <div class="spinner"></div>
  <div style="color:var(--subtext);font-size:14px;font-weight:600">作成中...</div>
</div>

<!-- メインコンテンツ -->
<div id="main-content" class="hidden">
  <header>
    <div class="header-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21 4 19 3c-1-.5-3 0-4.5 1.5L11 8 2.8 6.2c-.5-.1-.9.2-1.1.7L1 9c-.1.5.2 1 .6 1.3L8 14l-1.5 3L4 18c-.7.7-.7 1.7 0 2.4l1.6 1.6c.7.7 1.7.7 2.4 0L10 20l3 1.5.3 6.4c.3.4.8.7 1.3.6l2.3-.7c.5-.2.8-.6.7-1.1z"/>
      </svg>
      <h1>たびのあしあと</h1>
    </div>
    <p>旅の思い出を一緒に記録しよう</p>
  </header>

  <div class="content">
    <button class="btn-create" onclick="showCreateModal()">
      <i data-lucide="plus" width="22" height="22"></i>
      新規旅行を作成
    </button>

    <!-- ルームコードで参加 -->
    <div class="join-card">
      <div class="join-card-title">
        <i data-lucide="log-in" width="13" height="13"></i>
        ルームコードで参加
      </div>
      <div class="join-row">
        <input id="join-code-input" type="text" placeholder="A3F9K2" maxlength="6"
          class="join-input" oninput="this.value = this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter') joinByCode()">
        <button class="btn btn-secondary" onclick="joinByCode()">参加</button>
      </div>
    </div>

    <div id="trip-list-section" style="display:none">
      <div class="section-title">最近の旅行</div>
      <div id="trip-list"></div>
    </div>
  </div>
</div>

<!-- 旅行作成モーダル -->
<div id="create-modal" class="modal-overlay hidden" onclick="handleCreateBackdrop(event)">
  <div class="modal-sheet">
    <div class="modal-header">
      <span class="modal-title">新しい旅行を作成</span>
      <button class="modal-close" onclick="hideCreateModal()">
        <i data-lucide="x" width="22" height="22"></i>
      </button>
    </div>
    <div class="form-field">
      <label class="form-label">旅行名 <span style="color:var(--danger)">*</span></label>
      <input id="trip-name-input" type="text" placeholder="例：京都旅行、沖縄3泊4日" maxlength="30">
    </div>
    <div class="form-field">
      <label class="form-label">日程（省略可）</label>
      <div class="date-row">
        <input id="trip-start-input" type="date" style="flex:1">
        <span class="date-sep">〜</span>
        <input id="trip-end-input" type="date" style="flex:1">
      </div>
    </div>
    <div class="form-field">
      <label class="form-label">テーマカラー</label>
      <div class="theme-grid" id="theme-grid"></div>
    </div>
    <div id="create-error" class="form-error"></div>
    <button class="btn btn-primary" onclick="createTrip()" style="font-size:16px;padding:15px;margin-top:4px">
      作成する
    </button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  let db = null;
  let selectedTheme = 'ocean';

  function buildThemeGrid() {
    const grid = document.getElementById('theme-grid');
    if (!grid) return;
    grid.innerHTML = Object.entries(THEMES).map(([key, t]) => `
      <button class="theme-btn${key === selectedTheme ? ' selected' : ''}"
        style="--theme-color:${t.primary}"
        onclick="selectTheme('${key}')">
        <div class="theme-swatch" style="background:linear-gradient(135deg,${t.g1},${t.g2})"></div>
        <span class="th-label">${t.label}</span>
      </button>`).join('');
  }

  function selectTheme(key) {
    selectedTheme = key;
    buildThemeGrid();
  }

  // ---- メイン画面 ----
  function showMain() {
    document.getElementById('overlay-loading').classList.add('hidden');
    document.getElementById('main-content').classList.remove('hidden');
    renderTripList();
    renderIcons();
  }

  function renderTripList() {
    const trips   = loadTrips();
    const list    = document.getElementById('trip-list');
    const section = document.getElementById('trip-list-section');

    if (trips.length === 0) {
      section.style.display = 'none';
      list.innerHTML = '';
      return;
    }
    section.style.display = 'block';
    list.innerHTML = trips.map(trip => {
      const id      = esc(trip.id);
      const dateStr = formatTripDate(trip.startDate, trip.endDate);
      const th      = THEMES[trip.theme] || THEMES.ocean;
      const iconBg  = `linear-gradient(135deg,${th.g1},${th.g2})`;
      return `
        <div class="trip-card">
          <div class="trip-card-top" onclick="goToTrip('${id}')">
            <div class="trip-icon" style="background:${iconBg}">
              <i data-lucide="plane" width="22" height="22" style="stroke:white"></i>
            </div>
            <div class="trip-info">
              <div class="trip-name">${esc(trip.name || '旅行')}</div>
              ${dateStr ? `<div class="trip-date"><i data-lucide="calendar" width="12" height="12"></i>${esc(dateStr)}</div>` : ''}
              <div class="trip-last">${formatRelativeDate(trip.lastAccess)}</div>
            </div>
            <div class="trip-actions">
              <button class="trip-share" onclick="shareTrip(event,'${id}')" title="共有リンクをコピー">
                <i data-lucide="link" width="16" height="16"></i>
              </button>
              <span class="trip-arrow"><i data-lucide="chevron-right" width="20" height="20"></i></span>
            </div>
          </div>
          <div class="trip-feat-row">
            <a href="itinerary.html?room=${id}" class="trip-feat-btn">
              <i data-lucide="calendar" width="14" height="14"></i>旅程
            </a>
            <a href="warikan.html?room=${id}" class="trip-feat-btn">
              <i data-lucide="wallet" width="14" height="14"></i>精算
            </a>
            <a href="packing.html?room=${id}" class="trip-feat-btn">
              <i data-lucide="backpack" width="14" height="14"></i>持ち物
            </a>
          </div>
        </div>`;
    }).join('');
    renderIcons();
  }

  function goToTrip(id) {
    location.href = 'warikan.html?room=' + id;
  }

  async function shareTrip(event, id) {
    event.stopPropagation();
    const base = location.href.replace(/[^/]*(\?.*)?$/, '');
    const url  = base + 'warikan.html?room=' + id;
    try { await navigator.clipboard.writeText(url); }
    catch {
      const ta = document.createElement('textarea');
      ta.value = url; ta.style.cssText = 'position:fixed;top:-9999px';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); } catch {}
      document.body.removeChild(ta);
    }
    showToast('共有URLをコピーしました');
  }

  // ---- ルームコードで参加 ----
  function joinByCode() {
    const code = document.getElementById('join-code-input').value.trim().toUpperCase();
    if (code.length < 4) { showToast('ルームコードを入力してください'); return; }
    location.href = 'warikan.html?room=' + code;
  }

  // ---- 旅行作成 ----
  function showCreateModal() {
    document.getElementById('trip-name-input').value  = '';
    document.getElementById('trip-start-input').value = '';
    document.getElementById('trip-end-input').value   = '';
    document.getElementById('create-error').style.display = 'none';
    selectedTheme = 'ocean';
    buildThemeGrid();
    document.getElementById('create-modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('trip-name-input').focus(), 120);
  }

  function hideCreateModal() {
    document.getElementById('create-modal').classList.add('hidden');
  }

  function handleCreateBackdrop(e) {
    if (e.target === document.getElementById('create-modal')) hideCreateModal();
  }

  async function createTrip() {
    const name      = document.getElementById('trip-name-input').value.trim();
    const startDate = document.getElementById('trip-start-input').value;
    const endDate   = document.getElementById('trip-end-input').value;

    const errEl = document.getElementById('create-error');
    if (!name) {
      errEl.textContent = '旅行名を入力してください';
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';
    hideCreateModal();
    document.getElementById('overlay-loading').classList.remove('hidden');
    document.getElementById('main-content').classList.add('hidden');

    try {
      // 重複チェックしながら6桁コードを生成
      let code, attempts = 0;
      while (attempts < 5) {
        code = generateRoomCode();
        const existing = await db.collection('rooms').doc(code).get();
        if (!existing.exists) break;
        attempts++;
        if (attempts === 5) throw new Error('ルームコードの生成に失敗しました。もう一度お試しください。');
      }

      await db.collection('rooms').doc(code).set({
        name, theme: selectedTheme,
        startDate: startDate || '',
        endDate:   endDate   || '',
        members:  [], expenses: []
      });
      saveTrip({ id: code, name, theme: selectedTheme, startDate: startDate || '', endDate: endDate || '' });
      location.href = 'warikan.html?room=' + code;
    } catch (err) {
      console.error('createTrip error:', err);
      document.getElementById('overlay-loading').classList.add('hidden');
      document.getElementById('main-content').classList.remove('hidden');
      showToast('旅行の作成に失敗しました: ' + (err.message || ''));
    }
  }

  // ---- トースト ----
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ---- キーボード ----
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') hideCreateModal();
    if (e.key === 'Enter' && !document.getElementById('create-modal').classList.contains('hidden')) {
      const active = document.activeElement;
      if (active.id !== 'trip-start-input' && active.id !== 'trip-end-input') createTrip();
    }
  });

  // ---- 起動 ----
  window.addEventListener('DOMContentLoaded', () => {
    // ?room=XXX が付いていたら直接 warikan.html へ
    const roomId = new URLSearchParams(location.search).get('room');
    if (roomId) { location.href = 'warikan.html?room=' + roomId; return; }

    if (typeof firebase === 'undefined') {
      alert('Firebase JS の読み込みに失敗しました。ネットワーク接続を確認してください。');
      return;
    }
    try {
      db = initFirebaseApp();
      showMain();
    } catch (err) {
      console.error('Firebase init error:', err);
      alert('Firebase の初期化に失敗しました: ' + (err.message || ''));
    }
  });
</script>
</body>
</html>
